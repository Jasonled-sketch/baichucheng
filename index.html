<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#163A5F" />
<title>拜出誠藝 · 夥伴系統</title>
<link rel="manifest" href='data:application/json,{"name":"拜出誠藝","short_name":"拜出誠藝","start_url":".","display":"standalone","background_color":"%23F4EEE0","theme_color":"%23163A5F"}' />
<!-- 名片轉圖：html2canvas（cdnjs） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --navy:#163A5F; --navy2:#1E4E7E; --gold:#C9A227; --gold2:#E3C766; --gold-soft:#F0E2B0;
    --cream:#FBF6EA; --ink:#26221B; --muted:#7A746A; --paper:#FFFFFF; --line:#E7E1D3;
    --red:#B22222; --ok:#2E7D5B;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    color:var(--ink); background:linear-gradient(160deg,#F4EEE0,#ECE3D1);
    min-height:100vh; line-height:1.5;
  }
  .wrap{max-width:480px; margin:0 auto; min-height:100vh; position:relative;}
  .hidden{display:none !important;}

  /* ---------- 登入 ---------- */
  #loginScreen{display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;}
  .login-card{
    width:100%; max-width:360px; background:var(--paper); border-radius:20px;
    border:1px solid var(--line); padding:30px 24px 26px; text-align:center;
    box-shadow:0 12px 40px rgba(22,58,95,.12);
  }
  .brand{font-size:30px; font-weight:700; letter-spacing:4px; color:var(--navy);}
  .brand-line{width:54px; height:3px; background:var(--gold); border-radius:2px; margin:10px auto;}
  .brand-sub{font-size:13px; letter-spacing:2px; color:var(--gold); margin-bottom:7px;}
  .brand-ver{font-size:11px; letter-spacing:1px; color:#A89F8E; margin-bottom:22px;}
  .hint{font-size:13px; color:var(--muted); margin:0 0 14px;}
  .hint-sm{font-size:11px; color:#A89F8E; margin-top:18px;}
  .id-btn{
    display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:var(--paper); border:1px solid var(--line); border-radius:14px;
    padding:11px 14px; margin-bottom:9px; cursor:pointer; transition:.15s;
  }
  .id-btn:active{transform:scale(.98); background:#FBF7EE;}
  .id-ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex:none;}
  .id-meta .n{font-size:15px;font-weight:600;color:var(--ink);}
  .id-meta .s{font-size:12px;color:var(--muted);}

  /* ---------- 共用 ---------- */
  .btn{border:none; border-radius:12px; padding:13px 16px; font-size:15px; font-weight:600; cursor:pointer; width:100%; transition:.15s;}
  .btn:active{transform:scale(.98);}
  .btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#3A2C06; box-shadow:0 4px 16px rgba(201,162,39,.35);}
  .btn-navy{background:var(--navy); color:#fff;}
  .btn-ghost{background:var(--paper); border:1px solid var(--line); color:var(--ink);}
  .appheader{position:sticky; top:0; z-index:30;}
  .topbar{
    display:flex; align-items:center; gap:10px;
    background:var(--navy); color:#fff; padding:12px 16px;
  }
  .maintabs{display:flex; background:var(--paper); border-bottom:1px solid var(--line);}
  .mtab{flex:1; border:none; background:none; padding:10px 2px; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer; display:flex; flex-direction:row; align-items:center; justify-content:center; gap:4px; position:relative; transition:.12s;}
  .mtab svg{width:15px; height:15px; flex:none; opacity:.65;}
  .mtab.on{color:var(--navy);}
  .mtab.on svg{opacity:1;}
  .mtab.on::after{content:""; position:absolute; left:14%; right:14%; bottom:0; height:3px; border-radius:3px 3px 0 0; background:var(--gold);}
  .mtab:active{background:#FBF7EE;}
  .topbar .ttl{font-size:17px; font-weight:600; letter-spacing:1px;}
  .hdr-ver{font-size:10px; letter-spacing:1px; color:var(--gold); margin-left:6px; margin-right:auto; align-self:center;}
  .iconbtn{background:rgba(255,255,255,.14); border:none; color:#fff; width:34px; height:34px; border-radius:10px; font-size:18px; cursor:pointer; flex:none;}
  .userchip{display:flex; align-items:center; gap:7px; font-size:12px; background:rgba(255,255,255,.12); padding:5px 9px; border-radius:20px;}
  .userchip .u-ava{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
  .mode-chip{font-size:10px; background:rgba(255,255,255,.16); color:#FCEFD0; padding:3px 8px; border-radius:8px;}

  .pad{padding:18px 16px 40px;}

  /* ---------- 履歷：頁籤 ---------- */
  .tabs{display:flex; gap:8px; overflow-x:auto; padding:14px 16px 4px; -webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:none; font-size:13px; padding:8px 14px; border-radius:20px; cursor:pointer; white-space:nowrap;
    background:var(--paper); border:1px solid var(--line); color:var(--muted); transition:.15s;
  }
  .tab.on{background:var(--navy); border-color:var(--navy); color:#fff; font-weight:600;}

  /* ---------- 名片 ---------- */
  .namecard{
    background:var(--paper); border:1px solid #E8E4DA; border-radius:16px; overflow:hidden;
    box-shadow:0 8px 26px rgba(22,58,95,.12);
  }
  .nc-head{background:var(--navy); padding:18px 18px; display:flex; align-items:center; gap:13px;}
  .nc-ava{width:58px;height:58px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;font-size:15px;font-weight:600;}
  .nc-ava img{width:100%;height:100%;object-fit:cover;}
  .nc-name{font-size:20px;font-weight:700;color:#fff;letter-spacing:1px;}
  .nc-title{font-size:13px;color:var(--gold-soft);margin-top:3px;}
  .nc-body{padding:16px 18px 14px;}
  .nc-tag{display:inline-block;background:#FBF1D8;color:#8A6D1F;font-size:12px;border-radius:9px;padding:4px 11px;margin-bottom:14px;}
  .nc-adv{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px;font-size:14px;color:#33312C;line-height:1.5;}
  .nc-adv .mk{color:var(--gold);font-weight:700;flex:none;}
  .nc-div{height:1px;background:#ECE8DD;margin:14px 0;}
  .nc-ct{display:flex;gap:8px;align-items:center;margin-bottom:7px;font-size:14px;color:#33312C;}
  .nc-ct b{color:var(--navy);font-weight:600;flex:none;width:42px;}
  .nc-foot{background:#FBF6EA;border-top:1px solid #ECE8DD;padding:10px;text-align:center;font-size:11px;letter-spacing:1px;color:#8A6D1F;}

  .section-actions{display:flex; gap:10px; margin:14px 0 6px;}
  .section-actions .btn{font-size:14px; padding:12px;}

  .gate{display:flex;align-items:center;gap:10px;margin:26px 0 14px;color:var(--muted);font-size:12px;letter-spacing:1px;}
  .gate::before,.gate::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ---------- 後段 ---------- */
  .back-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px;}
  .bc-h{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--navy);margin-bottom:9px;}
  .bc-h .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
  .bc-li{font-size:14px;color:var(--ink);padding:5px 0 5px 16px;position:relative;line-height:1.5;border-bottom:1px dashed #EFEADD;}
  .bc-li:last-child{border-bottom:none;}
  .bc-li::before{content:"·";position:absolute;left:4px;color:var(--gold);font-weight:700;}
  .bc-want{background:#FFF8E8;border:1px solid #F0E2B0;border-radius:12px;padding:13px 15px;margin-bottom:12px;}
  .bc-want .bc-h{color:#8A6D1F;}
  .bc-empty{color:#B3AB9A;font-size:13px;}

  /* ---------- 商務發展：動態牆 ---------- */
  .feed-empty{color:#B3AB9A;font-size:14px;text-align:center;padding:30px 10px;line-height:1.7;}
  .post{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .post-head{display:flex;align-items:center;gap:8px;padding:13px 14px;cursor:pointer;}
  .ptag{font-size:11px;padding:2px 9px;border-radius:9px;flex:none;font-weight:600;}
  .ptitle{flex:1;min-width:0;font-size:14.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pdate{font-size:12px;color:var(--muted);flex:none;}
  .chev{font-style:normal;color:#B7AE9C;flex:none;transition:.2s;}
  .post.open .chev{transform:rotate(180deg);}
  .post-likes{display:flex;align-items:center;gap:6px;padding:0 14px 13px;}
  .like-btn{border:none;background:#F1ECE0;border-radius:20px;padding:5px 11px;font-size:15px;line-height:1;cursor:pointer;transition:.12s;}
  .like-btn:active{transform:scale(.92);}
  .like-btn.liked{background:linear-gradient(135deg,var(--gold2),var(--gold));}
  .like-btn.mine{opacity:.45;cursor:default;}
  .likers{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .lk-chip{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none;}
  .lk-empty{font-size:12px;color:#B7AE9C;}
  .post-body{display:none;padding:0 14px 14px;}
  .post.open .post-body{display:block;border-top:1px dashed #EDE7DA;padding-top:12px;}
  .pb-li{font-size:14px;color:var(--ink);padding:4px 0 4px 14px;position:relative;line-height:1.5;}
  .pb-li::before{content:"·";position:absolute;left:4px;color:var(--gold);font-weight:700;}
  .pb-photo{width:100%;border-radius:10px;margin-top:10px;border:1px solid var(--line);display:block;}
  .post-actions{display:flex;gap:10px;margin-top:14px;}
  .post-actions .btn{font-size:13px;padding:9px;}
  .type-row{display:flex;gap:8px;}
  .type-chip{flex:1;border:1px solid var(--line);background:#FCFAF4;border-radius:11px;padding:9px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;}
  .type-chip.on{background:var(--navy);border-color:var(--navy);color:#fff;}
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .photo-cell{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  .photo-cell img{width:100%;height:100%;object-fit:cover;}
  .photo-x{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:14px;line-height:1;cursor:pointer;}
  .cery-mask{position:fixed;inset:0;background:rgba(20,15,5,.55);z-index:85;display:flex;align-items:center;justify-content:center;padding:28px;}
  .cery-card{background:var(--paper);border:2px solid var(--gold);border-radius:20px;padding:26px 22px;max-width:300px;width:100%;text-align:center;box-shadow:0 0 0 6px rgba(201,162,39,.18),0 14px 40px rgba(0,0,0,.25);animation:ceryPop .5s ease;}
  .cery-thumb{font-size:52px;animation:ceryThumb .6s ease;}
  .cery-by{font-size:15px;color:var(--ink);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px;flex-wrap:wrap;}
  .cery-title{font-size:13px;color:var(--muted);margin:8px 0 4px;}
  .cery-note{font-size:11px;color:#B7AE9C;margin-bottom:16px;}
  @keyframes ceryPop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
  @keyframes ceryThumb{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0)}}

  /* ---------- 媒體（影片）＋ 產值輸出 ---------- */
  .photo-cell.vid video{width:100%;height:100%;object-fit:cover;}
  .photo-cell .vid-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;text-shadow:0 1px 4px rgba(0,0,0,.6);pointer-events:none;}
  .fld label.chk{display:flex;align-items:center;gap:8px;font-weight:500;}
  .fld label.chk input{width:auto;}
  .vp-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:14px;}
  .vp-h{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:12px;}
  .vp-legend{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}
  .vp-note{font-size:11px;color:var(--muted);margin-top:10px;}
  .vp-empty{color:#B3AB9A;font-size:13px;text-align:center;padding:16px;line-height:1.7;}
  .pentagon{display:block;}
  .pentagon .pg-name{font-size:11px;font-weight:600;text-anchor:middle;dominant-baseline:central;}
  .pentagon .pg-sc{font-size:10px;fill:var(--muted);text-anchor:middle;}
  .pentagon .pg-cnt{font-size:11px;font-weight:700;fill:var(--navy);text-anchor:middle;paint-order:stroke;stroke:var(--paper);stroke-width:3px;}
  .sb-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
  .sb-row:last-child{margin-bottom:0;}
  .sb-ava{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex:none;}
  .sb-mid{flex:1;min-width:0;display:flex;flex-direction:column;}
  .sb-top{display:flex;align-items:center;gap:6px;font-size:13px;}
  .sb-name{font-weight:600;color:var(--ink);}
  .sb-lv{font-size:10px;color:var(--muted);background:#EFE7D6;border-radius:7px;padding:1px 6px;}
  .sb-bar{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:5px;}
  .sb-fill{height:100%;background:linear-gradient(90deg,var(--navy2),var(--navy));}
  .sb-score{font-size:14px;font-weight:700;color:var(--navy);flex:none;width:30px;text-align:right;}
  .rf-item{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px dashed #EDE7DA;}
  .rf-item:last-child{border-bottom:none;}
  .rf-flow{font-weight:600;color:var(--ink);font-size:13px;}
  .rf-badge{font-size:10px;padding:1px 7px;border-radius:7px;margin-left:4px;white-space:nowrap;}
  .rf-meta{color:var(--muted);font-size:12px;margin-top:2px;}
  .rf-del{color:#B5635A;font-size:12px;background:none;border:none;cursor:pointer;flex:none;}

  /* ---------- 人情點（Phase 4）---------- */
  .vp-h2{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
  .vp-h2>span:first-child{font-size:15px;font-weight:700;color:var(--navy);}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none;}
  .seg button{border:none;background:var(--paper);color:var(--muted);font-size:11px;padding:5px 9px;cursor:pointer;}
  .seg button.on{background:var(--navy);color:#fff;}
  .db-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed #EDE7DA;cursor:pointer;}
  .db-row:last-child{border-bottom:none;}
  .db-mid{flex:1;min-width:0;}
  .db-name-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .db-name{font-weight:600;font-size:13px;color:var(--ink);}
  .db-king{font-size:10px;padding:1px 7px;border-radius:7px;}
  .db-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
  .db-bar-row:last-child{margin-bottom:0;}
  .db-tag{font-size:11px;color:var(--muted);width:28px;flex:none;}
  .db-track{flex:1;height:7px;border-radius:4px;background:var(--line);overflow:hidden;}
  .db-fill-biz{height:100%;background:#378ADD;}
  .db-fill-fav{height:100%;background:#D4537E;}
  .db-val{font-size:12px;font-weight:600;color:var(--ink);width:26px;text-align:right;flex:none;}
  .db-chev{color:#C7BDA8;font-size:20px;flex:none;}
  .action-row{display:flex;gap:10px;margin:2px 0 6px;}
  .action-row .btn{flex:1;}
  .bal-hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px;}
  .amt-group{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .amt-lab{font-size:12px;color:var(--muted);width:34px;flex:none;}
  .amt-btn{border:1px solid var(--line);background:#FCFAF4;border-radius:10px;padding:8px 12px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;}
  .amt-btn.on{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);color:#3A2C06;}
  .amt-btn.dis{opacity:.35;cursor:not-allowed;}
  .gift-mask{position:fixed;inset:0;background:rgba(28,20,6,.6);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gift-card{position:relative;width:300px;max-width:100%;background:#FBF6EA;border:2px solid #B8902F;border-radius:12px;padding:10px;box-shadow:0 0 22px 5px rgba(201,162,39,.55),0 14px 40px rgba(0,0,0,.3);animation:giftPop .5s ease;}
  @keyframes giftPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
  .gift-seal{position:absolute;top:16px;right:14px;width:50px;height:50px;border:2px solid #B22222;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-9deg);background:rgba(178,34,34,.05);color:#B22222;font-size:20px;font-family:"Songti TC","Noto Serif TC",serif;}
  .gift-inner{border:1px solid #D4B85E;border-radius:7px;padding:20px 18px;}
  .gift-cap{text-align:center;font-size:12px;letter-spacing:3px;color:#8A6D1F;font-family:"Songti TC","Noto Serif TC",serif;}
  .gift-title{text-align:center;font-size:26px;letter-spacing:8px;color:#5A4514;margin:6px 0 12px;font-weight:700;font-family:"Songti TC","Noto Serif TC",serif;}
  .gift-pts{display:flex;align-items:center;gap:8px;margin:4px 0;}
  .gift-pts .ln{flex:1;height:1px;background:#CBA94E;}
  .gift-pts .pt{font-size:28px;color:#8A6D1F;font-weight:700;}
  .gift-msg{font-size:14px;line-height:1.9;color:#4A3A14;text-align:justify;margin:14px 2px 16px;font-family:"Songti TC","Noto Serif TC",serif;}
  .gift-by{text-align:right;font-size:13px;color:#5A4514;font-family:"Songti TC","Noto Serif TC",serif;}
  .gift-date{text-align:right;font-size:11px;color:#A1853A;margin-top:2px;}
  .wall-list{display:flex;flex-direction:column;gap:12px;margin-bottom:6px;}
  .plaque{position:relative;background:#FBF6EA;border:2px solid #B8902F;border-radius:10px;padding:7px;box-shadow:0 0 10px 1px rgba(201,162,39,.35);}
  .plaque-inner{border:1px solid #D4B85E;border-radius:6px;padding:12px 14px;}
  .plaque-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .plaque-from{font-size:13px;color:#5A4514;display:flex;align-items:center;gap:7px;}
  .plaque-pt{font-size:17px;font-weight:700;color:#8A6D1F;}
  .plaque-msg{font-size:13px;line-height:1.7;color:#4A3A14;}
  .plaque-date{font-size:11px;color:#A1853A;text-align:right;margin-top:6px;}

  /* ---------- 數據儀表板（Phase 6）---------- */
  .dash-hero{background:linear-gradient(135deg,var(--navy2),var(--navy));border-radius:14px;padding:16px;color:#fff;margin-bottom:12px;}
  .dash-hero .lab{font-size:12px;opacity:.85;}
  .dash-hero .num{font-size:30px;font-weight:800;letter-spacing:.5px;margin-top:2px;}
  .dash-hero .sub{font-size:11px;opacity:.8;margin-top:4px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px;}
  .kpi{background:#FBF7EE;border:1px solid var(--line);border-radius:12px;padding:11px 13px;}
  .kpi .n{font-size:20px;font-weight:700;color:var(--navy);}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:1px;}
  .dash-sub{font-size:13px;font-weight:600;color:var(--ink);margin:16px 0 8px;}
  .chart{display:block;}
  .chart .ch-val{font-size:10px;fill:var(--navy);font-weight:700;text-anchor:middle;}
  .chart .ch-x{font-size:11px;fill:var(--muted);text-anchor:middle;}
  .isb-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
  .isb-row:last-child{margin-bottom:0;}
  .isb-ava{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex:none;}
  .isb-name{font-size:12px;color:var(--ink);width:56px;flex:none;}

/* 媒體限制：圖片 10MB（自動壓縮）、影片 720p / 3 分鐘 */
const IMG_MAX_MB=10, VIDEO_MAX_H=720, VIDEO_MAX_SEC=180;
function compressImage(file, maxDim=1600, quality=0.82){
  return new Promise((resolve,reject)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth, h=img.naturalHeight;
      if(Math.max(w,h)>maxDim){ const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      try{ resolve(c.toDataURL("image/jpeg",quality)); }catch(e){ reject(e); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error("img")); };
    img.src=url;
  });
}
function videoMeta(file){
  return new Promise((resolve,reject)=>{
    const v=document.createElement("video"); v.preload="metadata";
    const url=URL.createObjectURL(file);
    v.onloadedmetadata=()=>resolve({url, duration:v.duration||0, h:v.videoHeight||0, w:v.videoWidth||0});
    v.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error("video")); };
    v.src=url;
  });
}

/* CLOUD：Google 登入（部署時啟用） */
async function initCloudAndLogin(){
  try{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const appFb = initializeApp(firebaseConfig);
    const auth = getAuth(appFb);
    _fbSignOut=()=>signOut(auth);
    const showLoginBtn=()=>{ $("#cloudDenied").classList.add("hidden"); $("#googleBtn").classList.remove("hidden"); $("#cloudHint").classList.remove("hidden"); };
    onAuthStateChanged(auth, async (user)=>{
      if(!user){ showLoginBtn(); return; }
      const email=(user.email||"").toLowerCase();
      if(!(email in OWNERS)){
        $("#googleBtn").classList.add("hidden");
        $("#cloudHint").classList.add("hidden");
        $("#deniedEmail").textContent=user.email||"";
        $("#cloudDenied").classList.remove("hidden");
        return;
      }
      STATE.userKey=OWNERS[email];
      await dbLoad();
      $("#loginScreen").classList.add("hidden");
      $("#app").classList.remove("hidden");
      $("#modeChip").textContent="雲端";
      renderUserChip(); enterApp();
    });
    $("#googleBtn").onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(e=>toast("登入失敗："+e.code));
    $("#switchAcctBtn").onclick=()=>signOut(auth).then(showLoginBtn).catch(()=>location.reload());
  }catch(e){ toast("Firebase 載入失敗，請檢查設定"); }
}

        const a=document.createElement("a"); a.href=url; a.download="拜出誠藝名片.png"; document.body.appendChild(a); a.click(); a.remove();

function refPoints(r){ return r.isJoint?5:(r.status==="closed"?3:1); }
function levelOf(v){ return v>=100?5:v>=50?4:v>=25?3:v>=10?2:1; }
function computeScores(){ const s={}; INDUSTRIES.forEach(i=>s[i.key]=0); STATE.referrals.forEach(r=>{ if(s[r.fromKey]!=null) s[r.fromKey]+=refPoints(r); }); return s; }

function buildPentagonSVG(){
  const scores=computeScores();
  const cx=170, cy=148, R=108, r=24;
  const pts=INDUSTRIES.map((ind,i)=>{ const a=(-90+72*i)*Math.PI/180; return {ind, a, x:cx+R*Math.cos(a), y:cy+R*Math.sin(a)}; });
  const idx={}; INDUSTRIES.forEach((ind,i)=>idx[ind.key]=i);
  const cnt={}; STATE.referrals.forEach(rf=>{ const k=rf.fromKey+">"+rf.toKey; cnt[k]=(cnt[k]||0)+1; });
  const poly=pts.map(p=>p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  let arrows="";
  Object.keys(cnt).forEach(k=>{
    const sp=k.split(">"), a=pts[idx[sp[0]]], b=pts[idx[sp[1]]]; if(!a||!b) return;
    const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1, ux=dx/len, uy=dy/len;
    const sx=a.x+ux*(r+3), sy=a.y+uy*(r+3), ex=b.x-ux*(r+8), ey=b.y-uy*(r+8);
    const w=Math.min(1.2+cnt[k]*1.0, 5), col=INDUSTRIES[idx[sp[0]]].fg;
    const mx=(sx+ex)/2 - uy*9, my=(sy+ey)/2 + ux*9;
    arrows+=`<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="${col}" stroke-width="${w.toFixed(1)}" stroke-linecap="round" marker-end="url(#ah)"/>`;
    arrows+=`<text x="${mx.toFixed(1)}" y="${my.toFixed(1)}" class="pg-cnt">${cnt[k]}</text>`;
  });
  let nodes="";
  pts.forEach(p=>{
    const sc=scores[p.ind.key]||0;
    const lx=cx+(R+24)*Math.cos(p.a), ly=cy+(R+24)*Math.sin(p.a);
    nodes+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${p.ind.bg}" stroke="${p.ind.fg}" stroke-width="1.5"/>`;
    nodes+=`<text x="${p.x.toFixed(1)}" y="${(p.y+1).toFixed(1)}" class="pg-name" fill="${p.ind.fg}">${initialOf(STATE.data[p.ind.key])}</text>`;
    nodes+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" class="pg-sc">${sc}分</text>`;
  });
  return `<svg viewBox="0 0 340 312" width="100%" class="pentagon"><defs><marker id="ah" markerUnits="userSpaceOnUse" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><polygon points="${poly}" fill="none" stroke="#E7E1D3" stroke-width="1"/>${arrows}${nodes}</svg>`;
}

function flowOf(key){ let s=0; STATE.favors.forEach(f=>{ if(favorIsThisMonth(f)&&(f.fromKey===key||f.toKey===key)) s+=f.points; }); return s; }

function renderRefList(){

      b.onclick=()=>{ STATE.refPage=p; renderRefList(); window.scrollTo(0,0); };

function refItemEl(r){
  const f=IND[r.fromKey], t=IND[r.toKey], me=STATE.userKey;
  const st = r.status==="closed" ? `<span class="rf-st closed">已成交${r.valueNTD?(" $"+(parseInt(r.valueNTD,10)||0).toLocaleString()):""}</span>`
           : r.status==="overdue" ? `<span class="rf-st over">逾期</span>`
           : `<span class="rf-st pend">尚未完成</span>`;
  const jointB = r.isJoint?`<span class="rf-badge" style="background:#FFF1D8;color:#8A6D1F">聯合案</span>`:"";
  const isRecipient = (r.toKey===me);
  const acts = (isRecipient && r.status==="pending")
    ? `<div class="rf-acts"><button data-close class="ok">收到已成交</button>${isOver3mo(r)?`<button data-late>逾期</button>`:""}</div>` : "";
  const canDel = r.createdBy===me && r.status!=="closed";
  const node=el(`<div class="rf-item ${r.status==="overdue"?"over":""}">
    <div style="flex:1;min-width:0">
      <div class="rf-flow">${f?esc(f.name):""} → ${t?esc(t.name):""}${jointB}${st}</div>
      <div class="rf-meta">${esc(r.desc||"")} · ${esc(r.date)}</div>
      ${acts}

/* 引薦單照片智能辨識（呼叫 Claude，於 Claude 環境/正式後端可用） */
function fileToBase64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(",")[1]); r.onerror=rej; r.readAsDataURL(file); }); }
function matchMember(name, excludeKey){
  if(!name) return null;
  const s=String(name).replace(/\s/g,"");
  for(const i of INDUSTRIES){
    if(i.key===excludeKey) continue;
    const pn=(STATE.data[i.key].name||"").replace(/\s/g,"");
    if(pn && (s.includes(pn)||pn.includes(s))) return i.key;
    if(s.includes(i.name)||i.name.includes(s)) return i.key;
  }
  return null;
}
async function ocrReferral(file){
  const dataUrl=await compressImage(file, 1600, 0.85); // 統一轉 JPEG 並壓縮
  const b64=dataUrl.split(",")[1];
  const prompt='這是一張 BNI 商務引薦單照片。請擷取：給出引薦的人(giver)、被引薦對象/收方(receiver)、引薦內容或客戶(content)、金額(amount，沒有就空字串)。只回傳 JSON，不要任何其他文字：{"giver":"","receiver":"","content":"","amount":""}';
  const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
    model:"claude-sonnet-4-6", max_tokens:1000,
    messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:prompt}]}]
  })});
  const data=await resp.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
  try{ return JSON.parse(text.replace(/```json|```/g,"").trim()); }catch(_){ return null; }
}

/* ====== ⑫-D 數據儀表板 ====== */
function monthlySales(){
  const m={};
  STATE.referrals.forEach(r=>{ if(r.status!=="closed") return; const d=new Date(r.ts); const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); m[k]=(m[k]||0)+(parseInt(r.valueNTD,10)||0); });
  return Object.keys(m).sort().map(k=>({k, label:(+k.split("-")[1])+"月", val:m[k]}));
}
function industrySales(){
  const m={}; INDUSTRIES.forEach(i=>m[i.key]=0);
  STATE.referrals.forEach(r=>{ if(r.status==="closed"&&m[r.fromKey]!=null) m[r.fromKey]+=(parseInt(r.valueNTD,10)||0); });
  return INDUSTRIES.map(i=>({i, val:m[i.key]})).sort((a,b)=>b.val-a.val);
}
function buildMonthlyChart(){
  const data=monthlySales();
  if(!data.length) return '<div class="vp-empty">尚無成交金額資料</div>';
  const W=320,H=150,padB=26,padT=18,padL=8,padR=8;
  const max=Math.max(...data.map(d=>d.val),1), n=data.length;
  const gap=(W-padL-padR)/n, bw=Math.min(46, gap*0.6);
  let bars="";
  data.forEach((d,i)=>{
    const x=padL+gap*i+gap/2, h=(H-padB-padT)*(d.val/max), y=H-padB-h;
    bars+=`<rect x="${(x-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(2,h).toFixed(1)}" rx="3" fill="#378ADD"/>`;
    bars+=`<text x="${x.toFixed(1)}" y="${(y-5).toFixed(1)}" class="ch-val">${Math.round(d.val/1000)/10}萬</text>`;
    bars+=`<text x="${x.toFixed(1)}" y="${(H-8).toFixed(1)}" class="ch-x">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" class="chart"><line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="var(--line)" stroke-width="1"/>${bars}</svg>`;
}
function renderDashboard(){
  const refs=STATE.referrals, deals=refs.filter(r=>r.status==="closed");
  const totalSales=deals.reduce((s,r)=>s+(parseInt(r.valueNTD,10)||0),0);
  const jointCount=refs.filter(r=>r.isJoint).length;
  const favorTotal=STATE.favors.reduce((s,f)=>s+f.points,0);
  const isb=industrySales(), isbMax=Math.max(1,...isb.map(x=>x.val));
  const isbHtml=isb.map(({i,val})=>`<div class="isb-row">${avaKey(i.key,"isb-ava")}<span class="isb-name">${esc(i.name)}</span><span class="isb-track"><span class="isb-fill" style="width:${Math.round(val/isbMax*100)}%"></span></span><span class="isb-val">${val?("$"+val.toLocaleString()):"—"}</span></div>`).join("");
  const isr=industryReceived(), isrMax=Math.max(1,...isr.map(x=>x.val));
  const isrHtml=isr.map(({i,val})=>`<div class="isb-row">${avaKey(i.key,"isb-ava")}<span class="isb-name">${esc(i.name)}</span><span class="isb-track"><span class="isb-fill" style="width:${Math.round(val/isrMax*100)}%;background:#0C447C"></span></span><span class="isb-val">${val?("$"+val.toLocaleString()):"—"}</span></div>`).join("");
  $("#dashboard").innerHTML=`
    <div class="dash-hero"><div class="lab">累計成交金額</div><div class="num">$${totalSales.toLocaleString()}</div><div class="sub">${deals.length} 筆成交 · 來自夥伴互相引薦</div></div>
    <div class="kpi-grid">
      <div class="kpi"><div class="n">${refs.length}</div><div class="l">引薦總數</div></div>
      <div class="kpi"><div class="n">${deals.length}</div><div class="l">成交件數</div></div>
      <div class="kpi"><div class="n">${jointCount}</div><div class="l">聯合案</div></div>
    </div>
    <div class="dash-sub">月別成交趨勢</div>
    ${buildMonthlyChart()}
    <div class="dash-sub">各夥伴 給出引薦・成交金額</div>
    ${isbHtml}
    <div class="dash-sub">各夥伴 成交獲得・金額</div>
    ${isrHtml}
  `;
}
